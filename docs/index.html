<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TLDR Digest Archive</title>
<style>
  :root {
    --paper: #f4efe4;
    --card: #fdfaf2;
    --ink: #2b2118;
    --muted: #7a6a55;
    --accent: #e8862e;
    --rule: #d8cdb8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
    line-height: 1.5;
  }
  header { max-width: 900px; margin: 0 auto; padding: 24px 16px 0; text-align: center; }
  header img { max-width: 100%; height: auto; border-radius: 10px; border: 1px solid var(--rule); }
  h1 { font-size: 1.6rem; margin: 16px 0 4px; }
  .subtitle { color: var(--muted); font-style: italic; margin: 0 0 20px; }
  .layout {
    max-width: 900px; margin: 0 auto; padding: 0 16px 48px;
    display: grid; grid-template-columns: 170px 1fr; gap: 24px;
  }
  @media (max-width: 640px) { .layout { grid-template-columns: 1fr; } }
  nav h2, main h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); border-bottom: 2px solid var(--ink); padding-bottom: 4px; }
  nav ul { list-style: none; padding: 0; margin: 0; max-height: 70vh; overflow-y: auto; }
  nav a {
    display: block; padding: 6px 8px; color: var(--ink); text-decoration: none;
    border-left: 3px solid transparent; font-variant-numeric: tabular-nums;
  }
  nav a:hover { background: var(--card); }
  nav a.active { border-left-color: var(--accent); background: var(--card); font-weight: bold; }
  article.digest {
    background: var(--card); border: 1px solid var(--rule); border-radius: 10px;
    padding: 20px 24px; margin-bottom: 20px;
  }
  article.digest > h3 { margin: 0 0 2px; font-size: 1.25rem; }
  .tagline { color: var(--muted); font-style: italic; margin: 0 0 14px; }
  .section-name {
    font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--accent); border-bottom: 1px solid var(--rule);
    padding-bottom: 3px; margin: 18px 0 10px;
  }
  .story { margin: 0 0 12px; }
  .story a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--accent); }
  .story a:hover { color: var(--accent); }
  .story .headline { font-weight: bold; }
  .story .blurb { margin: 2px 0 0; color: #4a3d2e; font-size: 0.95rem; }
  .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 16px; }
  .empty { color: var(--muted); font-style: italic; padding: 40px 0; text-align: center; }
  footer { text-align: center; color: var(--muted); font-size: 0.8rem; padding-bottom: 32px; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<header>
  <img src="banner.jpg" alt="TLDR digest bot">
  <h1>TLDR Digest Archive</h1>
  <p class="subtitle">Daily key points from the TLDR newsletters, by date</p>
</header>

<div class="layout">
  <nav>
    <h2>Dates</h2>
    <ul id="dates"></ul>
  </nav>
  <main>
    <h2 id="current-date">&nbsp;</h2>
    <div id="content"><p class="empty">Loading…</p></div>
  </main>
</div>

<footer>
  Generated by <a href="https://github.com/pinardy/tldr-summarizer-bot">tldr-summarizer-bot</a> ·
  sources: <a href="https://tldr.tech">tldr.tech</a>
</footer>

<script>
(async function () {
  const datesEl = document.getElementById("dates");
  const contentEl = document.getElementById("content");
  const currentDateEl = document.getElementById("current-date");

  function el(tag, className, text) {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined) node.textContent = text;
    return node;
  }

  function renderDigest(digest) {
    const article = el("article", "digest");
    article.appendChild(el("h3", null, digest.title));
    if (digest.tagline) article.appendChild(el("p", "tagline", digest.tagline));
    for (const section of digest.sections || []) {
      if (section.name) article.appendChild(el("div", "section-name", section.name));
      for (const story of section.stories || []) {
        const div = el("div", "story");
        const headline = el("span", "headline");
        if (story.url) {
          const a = el("a", null, story.headline);
          a.href = story.url;
          a.target = "_blank";
          a.rel = "noopener";
          headline.appendChild(a);
        } else {
          headline.textContent = story.headline;
        }
        div.appendChild(headline);
        div.appendChild(el("p", "blurb", story.blurb));
        article.appendChild(div);
      }
    }
    return article;
  }

  async function showDate(date, dates) {
    currentDateEl.textContent = date;
    contentEl.replaceChildren(el("p", "empty", "Loading…"));
    for (const a of datesEl.querySelectorAll("a")) {
      a.classList.toggle("active", a.dataset.date === date);
    }
    try {
      const resp = await fetch(`data/${date}.json`);
      if (!resp.ok) throw new Error(resp.status);
      const day = await resp.json();
      contentEl.replaceChildren();
      const mode = day.mode === "combined" ? "combined digest" : "per-newsletter digests";
      contentEl.appendChild(
        el("p", "meta", `${mode} · newsletters: ${(day.categories || []).join(", ")}`)
      );
      for (const digest of day.digests || []) contentEl.appendChild(renderDigest(digest));
    } catch {
      contentEl.replaceChildren(el("p", "empty", `No digest found for ${date}.`));
    }
  }

  let dates = [];
  try {
    const resp = await fetch("data/index.json");
    dates = await resp.json();
  } catch {}

  if (!dates.length) {
    contentEl.replaceChildren(el("p", "empty", "No digests archived yet — check back after the next scheduled run."));
    return;
  }

  for (const date of dates) {
    const li = document.createElement("li");
    const a = el("a", null, date);
    a.href = `#${date}`;
    a.dataset.date = date;
    li.appendChild(a);
    datesEl.appendChild(li);
  }

  function currentTarget() {
    const hash = location.hash.slice(1);
    return dates.includes(hash) ? hash : dates[0];
  }
  window.addEventListener("hashchange", () => showDate(currentTarget(), dates));
  await showDate(currentTarget(), dates);
})();
</script>
</body>
</html>
