name: Daily TLDR digest

on:
  schedule:
    # TLDR publishes ~6 AM US Eastern (10-11:00 UTC). The 13:00 UTC run
    # (21:00 SGT) delivers issues the evening they're published; the 01:00 UTC
    # run (09:00 SGT) catches late publishes and missed runs. The state file
    # dedups everything, so both runs are always safe.
    - cron: "0 13 * * *"
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write # to commit data/state.json back

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Send digests
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: uv run python -m tech_news_summarizer

      - name: Commit updated state and archive
        if: always() # partial runs still record what was sent
        run: |
          if [ -n "$(git status --porcelain data/state.json docs/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/state.json docs/data
            git commit -m "chore: update digest state and archive [skip ci]"
            git push
          else
            echo "state and archive unchanged"
          fi
